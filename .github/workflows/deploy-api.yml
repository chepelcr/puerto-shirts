# API Gateway (SAM) — MANUAL only.
# Regenerates the per-endpoint template from the swagger spec, then `sam build`
# + `sam deploy` (custom domain, ACM cert, Route53). This changes the public API
# contract, so it is deliberately NOT run on every push — trigger it by hand
# after the Lambda code is live and whenever endpoints are added/changed.
name: Deploy API Gateway (SAM, manual)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        type: choice
        options: [dev, prod]
        default: dev

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-api-${{ github.event.inputs.environment }}
  cancel-in-progress: false

env:
  ENVIRONMENT: ${{ github.event.inputs.environment }}
  REGION: us-east-1

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ENVIRONMENT == 'prod' && secrets.AWS_DEPLOY_ROLE_ARN_PROD || secrets.AWS_DEPLOY_ROLE_ARN_DEV }}
          aws-region: ${{ env.REGION }}
      - run: pnpm install --frozen-lockfile
      - name: Install SAM CLI
        run: pip3 install aws-sam-cli pyyaml
      - name: Generate template + sam build + sam deploy
        run: bash scripts/pipeline-api.sh
