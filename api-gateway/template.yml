AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: puerto-shirts API Gateway (generated by scripts/gen_api_template.py)

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, prod]
  HostedZoneId:
    Type: String
    Description: Route53 Hosted Zone ID (resolved at deploy time)
  DomainName:
    Type: String
    Default: api.shirts.jcampos.dev
    Description: Custom domain for the API

Resources:

  ApiGatewayRestApi:
