AWSTemplateFormatVersion: "2010-09-09"
Description: >
  puerto-shirts database secret placeholder. Creates the Secrets Manager entry;
  the real Supabase credentials are written by secrets/build-secrets.sh
  (never stored in code).

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, prod]
    Description: Deployment environment

Resources:
  DatabaseSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "pacific/${Environment}/puerto-shirts/database"
      Description: !Sub "puerto-shirts database credentials (${Environment}) — Supabase"
      # Placeholder — overwritten by secrets/build-secrets.sh immediately after stack creation
      SecretString: '{"host":"pending","port":"6543","username":"pending","password":"pending","dbname":"postgres"}'
      Tags:
        - Key: Project
          Value: puerto-shirts
        - Key: Environment
          Value: !Ref Environment

Outputs:
  SecretName:
    Description: Secrets Manager secret name for the database
    Value: !Sub "pacific/${Environment}/puerto-shirts/database"
    Export:
      Name: !Sub "puerto-shirts-${Environment}-db-secret-name"
  SecretArn:
    Description: Secrets Manager secret ARN
    Value: !Ref DatabaseSecret
    Export:
      Name: !Sub "puerto-shirts-${Environment}-db-secret-arn"
