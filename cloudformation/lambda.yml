AWSTemplateFormatVersion: "2010-09-09"
Description: >
  puerto-shirts API Lambda (plain CloudFormation, no SAM). Deploy per environment
  AFTER the s3-uploads stack and AFTER the DB secret exists. Code starts as a
  placeholder; GitHub Actions updates it via lambda:UpdateFunctionCode.

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, prod]

  DbSecretName:
    Type: String
    Default: pacific/dev/puerto-shirts/database
    Description: "Secrets Manager secret name holding the Supabase DB credentials (host, port, username, password, dbname)"

  UploadsBucketName:
    Type: String
    Description: S3 uploads bucket (created by cloudformation/s3-uploads.yaml)

  PublicAssetBaseUrl:
    Type: String
    Description: Public base URL for uploaded assets (e.g. https://uploads.shirts.jcampos.dev)

Resources:
  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "puerto-shirts-${Environment}-api-handler"
      Description: puerto-shirts API handler (Express via serverless-http)
      PackageType: Zip
      Runtime: nodejs20.x
      Handler: lambda.handler
      Role: !GetAtt LambdaRole.Arn
      Code:
        ZipFile: |
          exports.handler = async () => ({
            statusCode: 200,
            body: JSON.stringify({ message: 'Placeholder - deploy code via GitHub Actions' })
          });
      MemorySize: 512
      Timeout: 30
      Environment:
        Variables:
          NODE_ENV: production
          DB_SECRET_NAME: !Ref DbSecretName
          UPLOADS_BUCKET: !Ref UploadsBucketName
          PUBLIC_ASSET_BASE_URL: !Ref PublicAssetBaseUrl
          SSM_BASE_PATH: !Sub "/pacific/${Environment}/puerto-shirts"

  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "puerto-shirts-${Environment}-lambda-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: [lambda.amazonaws.com]
            Action: sts:AssumeRole
      Path: /
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: puerto-shirts-runtime
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: DbSecret
                Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${DbSecretName}-*"
              - Sid: UploadsBucket
                Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                Resource: !Sub "arn:aws:s3:::${UploadsBucketName}/*"
              - Sid: SsmConfig
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParametersByPath
                Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/pacific/${Environment}/puerto-shirts/*"

Outputs:
  LambdaArn:
    Value: !GetAtt LambdaFunction.Arn
    Export:
      Name: !Sub "puerto-shirts-${Environment}-api-handler-arn"
  LambdaName:
    Value: !Ref LambdaFunction
